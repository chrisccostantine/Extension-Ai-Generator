<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Generator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>AI Product Generator</h2>
    <p class="subtitle">Create Shopify product copy from the current product title.</p>
    <label class="fieldLabel" for="backendUrl">Backend URL</label>
    <input id="backendUrl" type="url" />
    <label class="fieldLabel" for="accessToken">Access Token</label>
    <input id="accessToken" type="password" />
    <p class="helperText">Use the same token you set as `ACCESS_TOKEN` in Railway.</p>
    <button id="generateBtn">Generate Description</button>
    <button id="inspectBtn" class="secondary">Inspect Editor</button>
    <p id="status"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
